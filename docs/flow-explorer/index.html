<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WholeSale Connect AI — Flow Explorer</title>
<style>
  :root {
    --bg: #0b1220;
    --panel: #131c30;
    --panel-2: #1a2540;
    --border: #233153;
    --text: #e6ecf5;
    --text-dim: #94a3b8;
    --muted: #5b6a86;
    --accent: #fbbf24;
    --accent-soft: rgba(251, 191, 36, 0.18);
    --edge-idle: #2c3a5c;
    --edge-flow: #5b8def;
    --edge-active: #fbbf24;
    --node-stroke: #2a3958;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }
  header {
    padding: 14px 20px 8px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  h1 { margin: 0 0 4px; font-size: 16px; font-weight: 600; letter-spacing: 0.2px; }
  .subtitle { color: var(--text-dim); font-size: 12px; }
  .flow-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  .chip {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12.5px;
    cursor: pointer;
    user-select: none;
    transition: all 0.15s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .chip:hover { border-color: var(--edge-flow); color: white; }
  .chip.active {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }
  .layout {
    display: grid;
    grid-template-columns: 1fr 360px;
    height: calc(100vh - 90px);
  }
  .canvas-wrap {
    overflow-x: scroll;
    overflow-y: auto;
    background:
      radial-gradient(circle at 30% 20%, rgba(91, 141, 239, 0.06), transparent 60%),
      radial-gradient(circle at 80% 70%, rgba(251, 191, 36, 0.04), transparent 50%),
      var(--bg);
  }
  /* Custom horizontal scrollbar — always visible */
  .canvas-wrap::-webkit-scrollbar {
    height: 14px;
    width: 12px;
    background: var(--panel);
  }
  .canvas-wrap::-webkit-scrollbar-track {
    background: var(--panel);
    border-top: 1px solid var(--border);
  }
  .canvas-wrap::-webkit-scrollbar-thumb {
    background: #34466e;
    border-radius: 7px;
    border: 2px solid var(--panel);
  }
  .canvas-wrap::-webkit-scrollbar-thumb:hover {
    background: var(--edge-flow);
  }
  .canvas-wrap::-webkit-scrollbar-corner {
    background: var(--panel);
  }
  .canvas-wrap {
    scrollbar-color: #34466e var(--panel);
    scrollbar-width: thin;
  }
  svg.canvas {
    display: block;
    width: 1760px;
    min-width: 1760px;
    height: 1000px;
    min-height: 1000px;
  }
  /* Side panel */
  aside {
    border-left: 1px solid var(--border);
    background: var(--panel);
    overflow-y: auto;
    padding: 18px 18px 60px;
  }
  aside h2 {
    margin: 0 0 6px;
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  aside .flow-desc {
    color: var(--text-dim);
    font-size: 12.5px;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .btn {
    flex: 1;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--edge-flow); }
  .btn.primary {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }
  ol.steps {
    list-style: none;
    padding: 0;
    margin: 0;
    counter-reset: step;
  }
  ol.steps li {
    padding: 10px 12px 10px 38px;
    border-radius: 8px;
    margin-bottom: 6px;
    background: var(--panel-2);
    border: 1px solid transparent;
    cursor: pointer;
    position: relative;
    transition: all 0.15s ease;
    counter-increment: step;
  }
  ol.steps li::before {
    content: counter(step);
    position: absolute;
    left: 10px;
    top: 10px;
    width: 22px;
    height: 22px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 50%;
    text-align: center;
    line-height: 21px;
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 600;
  }
  ol.steps li.active {
    background: var(--accent-soft);
    border-color: var(--accent);
  }
  ol.steps li.active::before {
    background: var(--accent);
    color: #1a1208;
    border-color: var(--accent);
  }
  ol.steps li:hover { border-color: var(--edge-flow); }
  .step-label {
    font-size: 12.5px;
    color: var(--text);
    font-weight: 500;
  }
  .step-route {
    font-size: 11px;
    color: var(--text-dim);
    margin: 2px 0 6px;
  }
  .step-route b { color: var(--text); font-weight: 500; }
  .step-payload {
    font-family: ui-monospace, "JetBrains Mono", Menlo, monospace;
    font-size: 10.5px;
    color: #8db3ff;
    background: rgba(91, 141, 239, 0.08);
    padding: 4px 6px;
    border-radius: 4px;
    word-break: break-word;
    display: block;
    line-height: 1.4;
  }
  /* SVG node */
  .node rect {
    fill: var(--panel);
    stroke: var(--node-stroke);
    stroke-width: 1.5;
    transition: stroke 0.2s, fill 0.2s, filter 0.2s;
  }
  .node.endpoint rect {
    stroke: var(--accent);
    stroke-width: 2.5;
    filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.5));
  }
  .node.in-flow rect {
    stroke-width: 2;
  }
  .node.dim rect { opacity: 0.35; }
  .node.dim .layer-bar { opacity: 0.35; }
  .node text.node-label {
    fill: var(--text);
    font-size: 12px;
    font-weight: 600;
    pointer-events: none;
  }
  .node text.node-sub {
    fill: var(--text-dim);
    font-size: 10px;
    pointer-events: none;
  }
  .node:hover rect { stroke: var(--edge-flow); cursor: pointer; }
  .node .layer-bar {
    transition: opacity 0.2s;
  }
  /* Edges */
  .edge {
    fill: none;
    stroke: var(--edge-flow);
    stroke-width: 1.6;
    opacity: 0.5;
    transition: opacity 0.25s, stroke 0.25s, stroke-width 0.25s;
  }
  .edge.active {
    stroke: var(--edge-active);
    stroke-width: 2.6;
    opacity: 1;
    filter: drop-shadow(0 0 6px rgba(251, 191, 36, 0.6));
  }
  .edge-label {
    fill: var(--text-dim);
    font-size: 10px;
    font-family: ui-monospace, Menlo, monospace;
    opacity: 0.85;
    pointer-events: none;
  }
  .edge-label.active { fill: var(--accent); font-weight: 600; }
  /* Column headers */
  .col-header {
    fill: var(--text-dim);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }
  .col-divider {
    stroke: var(--border);
    stroke-width: 1;
    stroke-dasharray: 2 4;
  }
  /* Tooltip */
  #tooltip {
    position: fixed;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 11.5px;
    max-width: 280px;
    pointer-events: none;
    z-index: 100;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    display: none;
    line-height: 1.4;
  }
  #tooltip .tt-title { font-weight: 600; color: var(--text); margin-bottom: 3px; }
  #tooltip .tt-sub { font-family: ui-monospace, Menlo, monospace; color: #8db3ff; font-size: 10.5px; margin-bottom: 4px; }
  #tooltip .tt-desc { color: var(--text-dim); }
  .empty-state {
    color: var(--text-dim);
    font-size: 13px;
    text-align: center;
    padding: 40px 20px;
  }
  .error {
    color: #fca5a5;
    background: rgba(248, 113, 113, 0.1);
    border: 1px solid rgba(248, 113, 113, 0.3);
    padding: 12px;
    border-radius: 6px;
    font-size: 12px;
  }
</style>
</head>
<body>
  <header>
    <h1 id="title">WholeSale Connect AI — Flow Explorer</h1>
    <div class="subtitle" id="subtitle">Loading…</div>
    <div class="flow-chips" id="chips"></div>
  </header>
  <div class="layout">
    <div class="canvas-wrap">
      <svg class="canvas" id="canvas" viewBox="0 0 1760 1000" preserveAspectRatio="xMinYMin meet" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arrow-idle" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 z" fill="#5b8def" />
          </marker>
          <marker id="arrow-active" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 z" fill="#fbbf24" />
          </marker>
        </defs>
        <g id="g-columns"></g>
        <g id="g-edges"></g>
        <g id="g-nodes"></g>
      </svg>
    </div>
    <aside>
      <div id="panel">
        <div class="empty-state">Select a flow above to explore.</div>
      </div>
    </aside>
  </div>
  <div id="tooltip"></div>

<script>
const COL_X     = [130, 380, 630, 880, 1130, 1380];
const ROW_TOP   = 100;
const ROW_GAP   = 78;
const NODE_W    = 200;
const NODE_H    = 56;
const SVG_W     = 1700;

const $ = (id) => document.getElementById(id);

let DATA = null;
let activeFlow = null;
let activeStep = null;
let playing = false;
let playTimer = null;

async function load() {
  try {
    const res = await fetch('flows.json');
    if (!res.ok) throw new Error('flows.json HTTP ' + res.status);
    DATA = await res.json();
  } catch (err) {
    $('panel').innerHTML = '<div class="error"><b>Failed to load flows.json</b><br>' + err.message +
      '<br><br>Run from a local server: <code>npx serve docs/flow-explorer</code> or <code>python -m http.server 8000</code></div>';
    console.error(err);
    return;
  }

  $('title').textContent = DATA.meta.title;
  $('subtitle').textContent = DATA.meta.subtitle + '  ·  v' + DATA.meta.version;

  // Compute layer column map
  const layerByCol = {};
  DATA.layers.forEach(l => { layerByCol[l.id] = l; });
  DATA._layerById = layerByCol;
  DATA._nodeById = {};
  DATA.nodes.forEach(n => {
    const layer = layerByCol[n.layer];
    n.x = COL_X[layer.column - 1];
    n.y = ROW_TOP + (n.row - 1) * ROW_GAP;
    DATA._nodeById[n.id] = n;
  });

  renderColumns();
  renderNodes();
  renderChips();
}

function renderColumns() {
  const g = $('g-columns');
  g.innerHTML = '';
  DATA.layers.forEach(l => {
    const x = COL_X[l.column - 1];
    const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    txt.setAttribute('x', x);
    txt.setAttribute('y', 60);
    txt.setAttribute('text-anchor', 'middle');
    txt.setAttribute('class', 'col-header');
    txt.setAttribute('fill', l.color);
    txt.textContent = l.label;
    g.appendChild(txt);
  });
  // Vertical dividers between columns
  for (let i = 1; i < COL_X.length; i++) {
    const xMid = (COL_X[i-1] + COL_X[i]) / 2;
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', xMid);
    line.setAttribute('x2', xMid);
    line.setAttribute('y1', 75);
    line.setAttribute('y2', 980);
    line.setAttribute('class', 'col-divider');
    g.appendChild(line);
  }
}

function renderNodes() {
  const g = $('g-nodes');
  g.innerHTML = '';
  DATA.nodes.forEach(n => {
    const layer = DATA._layerById[n.layer];
    const grp = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    grp.setAttribute('class', 'node');
    grp.setAttribute('data-id', n.id);
    grp.setAttribute('transform', `translate(${n.x - NODE_W/2}, ${n.y - NODE_H/2})`);

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('width', NODE_W);
    rect.setAttribute('height', NODE_H);
    rect.setAttribute('rx', 8);
    grp.appendChild(rect);

    // Left color bar by layer
    const bar = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bar.setAttribute('class', 'layer-bar');
    bar.setAttribute('x', 0);
    bar.setAttribute('y', 0);
    bar.setAttribute('width', 4);
    bar.setAttribute('height', NODE_H);
    bar.setAttribute('rx', 2);
    bar.setAttribute('fill', layer.color);
    grp.appendChild(bar);

    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('class', 'node-label');
    label.setAttribute('x', 14);
    label.setAttribute('y', 22);
    label.textContent = truncate(n.label, 26);
    grp.appendChild(label);

    const sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    sub.setAttribute('class', 'node-sub');
    sub.setAttribute('x', 14);
    sub.setAttribute('y', 40);
    sub.textContent = truncate(n.sub || '', 30);
    grp.appendChild(sub);

    grp.addEventListener('mouseenter', (e) => showTooltip(n, e));
    grp.addEventListener('mousemove', (e) => moveTooltip(e));
    grp.addEventListener('mouseleave', hideTooltip);

    g.appendChild(grp);
  });
}

function renderChips() {
  const c = $('chips');
  c.innerHTML = '';
  DATA.flows.forEach(f => {
    const b = document.createElement('button');
    b.className = 'chip';
    b.dataset.flowId = f.id;
    b.innerHTML = `<span>${f.icon || '•'}</span><span>${f.title}</span>`;
    b.addEventListener('click', () => selectFlow(f.id));
    c.appendChild(b);
  });
}

function selectFlow(flowId) {
  stopPlay();
  activeFlow = DATA.flows.find(f => f.id === flowId);
  activeStep = null;
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.toggle('active', c.dataset.flowId === flowId);
  });
  drawEdges();
  renderPanel();
  updateNodeStates();
}

function drawEdges() {
  const g = $('g-edges');
  g.innerHTML = '';
  if (!activeFlow) return;

  activeFlow.steps.forEach((step, idx) => {
    const from = DATA._nodeById[step.from];
    const to   = DATA._nodeById[step.to];
    if (!from || !to) {
      console.warn('Missing node for step', step);
      return;
    }
    const p = buildPath(from, to, idx, activeFlow.steps.length);
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('class', 'edge');
    path.setAttribute('d', p.d);
    path.setAttribute('marker-end', 'url(#arrow-idle)');
    path.setAttribute('data-step', idx);
    g.appendChild(path);

    // Edge label (truncated payload at midpoint)
    const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    lbl.setAttribute('class', 'edge-label');
    lbl.setAttribute('x', p.midX);
    lbl.setAttribute('y', p.midY - 4);
    lbl.setAttribute('text-anchor', 'middle');
    lbl.setAttribute('data-step', idx);
    lbl.textContent = truncate(step.label, 24);
    g.appendChild(lbl);
  });
}

function buildPath(from, to, idx, total) {
  const x1 = from.x, y1 = from.y;
  const x2 = to.x,   y2 = to.y;
  const dx = x2 - x1;
  const dy = y2 - y1;

  // Adjust start/end to node edges
  let sx, sy, ex, ey;
  if (Math.abs(dx) > Math.abs(dy) * 0.5) {
    // Mostly horizontal
    sx = x1 + (dx > 0 ? NODE_W/2 : -NODE_W/2);
    sy = y1;
    ex = x2 + (dx > 0 ? -NODE_W/2 : NODE_W/2);
    ey = y2;
  } else {
    // Mostly vertical (same column)
    sx = x1;
    sy = y1 + (dy > 0 ? NODE_H/2 : -NODE_H/2);
    ex = x2;
    ey = y2 + (dy > 0 ? -NODE_H/2 : NODE_H/2);
  }

  let d;
  if (from.id === to.id) {
    // Self-loop
    const r = 28;
    d = `M ${x1 + NODE_W/2 - 6} ${y1 - NODE_H/2 + 8}
         C ${x1 + NODE_W/2 + r} ${y1 - 40},
           ${x1 + NODE_W/2 + r} ${y1 + 40},
           ${x1 + NODE_W/2 - 6} ${y1 + NODE_H/2 - 8}`;
    return { d, midX: x1 + NODE_W/2 + r, midY: y1 };
  }

  // Curved cubic for horizontal; quadratic for vertical
  if (Math.abs(dx) > 20) {
    const cx1 = sx + dx * 0.45;
    const cy1 = sy;
    const cx2 = ex - dx * 0.45;
    const cy2 = ey;
    d = `M ${sx} ${sy} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${ex} ${ey}`;
  } else {
    // Same column: curve outward to the right
    const offset = 40 + (idx % 3) * 10;
    const cx = sx + offset;
    d = `M ${sx} ${sy} Q ${cx} ${(sy + ey) / 2}, ${ex} ${ey}`;
  }
  return { d, midX: (sx + ex) / 2, midY: (sy + ey) / 2 };
}

function renderPanel() {
  const p = $('panel');
  if (!activeFlow) {
    p.innerHTML = '<div class="empty-state">Select a flow above to explore.</div>';
    return;
  }
  let html = `
    <h2>${activeFlow.icon || ''} ${activeFlow.title}</h2>
    <div class="flow-desc">${activeFlow.description}</div>
    <div class="controls">
      <button class="btn primary" id="btn-play">▶ Play</button>
      <button class="btn" id="btn-step-prev">‹ Prev</button>
      <button class="btn" id="btn-step-next">Next ›</button>
      <button class="btn" id="btn-reset">Reset</button>
    </div>
    <ol class="steps">
  `;
  activeFlow.steps.forEach((step, idx) => {
    const from = DATA._nodeById[step.from];
    const to   = DATA._nodeById[step.to];
    html += `
      <li data-step="${idx}">
        <div class="step-label">${escapeHtml(step.label)}</div>
        <div class="step-route"><b>${escapeHtml(from?.label || step.from)}</b> → <b>${escapeHtml(to?.label || step.to)}</b></div>
        <code class="step-payload">${escapeHtml(step.payload || '')}</code>
      </li>
    `;
  });
  html += `</ol>`;
  p.innerHTML = html;

  $('btn-play').addEventListener('click', togglePlay);
  $('btn-step-prev').addEventListener('click', () => stepBy(-1));
  $('btn-step-next').addEventListener('click', () => stepBy(1));
  $('btn-reset').addEventListener('click', () => { activeStep = null; updateNodeStates(); highlightStep(null); refreshStepList(); });

  document.querySelectorAll('ol.steps li').forEach(li => {
    li.addEventListener('click', () => {
      stopPlay();
      const idx = Number(li.dataset.step);
      activeStep = idx;
      highlightStep(idx);
      updateNodeStates();
      refreshStepList();
    });
  });
}

function refreshStepList() {
  document.querySelectorAll('ol.steps li').forEach(li => {
    li.classList.toggle('active', Number(li.dataset.step) === activeStep);
  });
  if (activeStep !== null) {
    const activeLi = document.querySelector(`ol.steps li[data-step="${activeStep}"]`);
    if (activeLi) activeLi.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

function highlightStep(idx) {
  document.querySelectorAll('.edge').forEach(e => {
    const stepIdx = Number(e.getAttribute('data-step'));
    const isActive = stepIdx === idx;
    e.classList.toggle('active', isActive);
    e.setAttribute('marker-end', isActive ? 'url(#arrow-active)' : 'url(#arrow-idle)');
  });
  document.querySelectorAll('.edge-label').forEach(e => {
    e.classList.toggle('active', Number(e.getAttribute('data-step')) === idx);
  });
}

function updateNodeStates() {
  document.querySelectorAll('.node').forEach(n => {
    n.classList.remove('endpoint', 'in-flow', 'dim');
  });
  if (!activeFlow) return;

  // Collect node IDs that appear in this flow
  const inFlow = new Set();
  activeFlow.steps.forEach(s => { inFlow.add(s.from); inFlow.add(s.to); });

  // Endpoints for active step
  let endpoints = new Set();
  if (activeStep !== null) {
    const s = activeFlow.steps[activeStep];
    endpoints.add(s.from); endpoints.add(s.to);
  }

  document.querySelectorAll('.node').forEach(n => {
    const id = n.getAttribute('data-id');
    if (endpoints.has(id)) n.classList.add('endpoint');
    else if (inFlow.has(id)) n.classList.add('in-flow');
    else n.classList.add('dim');
  });
}

function stepBy(delta) {
  if (!activeFlow) return;
  stopPlay();
  const total = activeFlow.steps.length;
  if (activeStep === null) activeStep = delta > 0 ? 0 : total - 1;
  else activeStep = (activeStep + delta + total) % total;
  highlightStep(activeStep);
  updateNodeStates();
  refreshStepList();
}

function togglePlay() {
  if (playing) stopPlay();
  else startPlay();
}

function startPlay() {
  if (!activeFlow) return;
  playing = true;
  $('btn-play').textContent = '⏸ Pause';
  $('btn-play').classList.add('primary');
  activeStep = -1;
  tickPlay();
}

function tickPlay() {
  if (!playing) return;
  activeStep = (activeStep + 1) % activeFlow.steps.length;
  highlightStep(activeStep);
  updateNodeStates();
  refreshStepList();
  playTimer = setTimeout(tickPlay, 1100);
}

function stopPlay() {
  playing = false;
  if (playTimer) clearTimeout(playTimer);
  const btn = $('btn-play');
  if (btn) { btn.textContent = '▶ Play'; }
}

function truncate(s, n) {
  if (!s) return '';
  return s.length > n ? s.slice(0, n - 1) + '…' : s;
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;');
}

function showTooltip(n, e) {
  const tt = $('tooltip');
  tt.innerHTML = `
    <div class="tt-title">${escapeHtml(n.label)}</div>
    <div class="tt-sub">${escapeHtml(n.sub || '')}</div>
    <div class="tt-desc">${escapeHtml(n.desc || '')}</div>
  `;
  tt.style.display = 'block';
  moveTooltip(e);
}
function moveTooltip(e) {
  const tt = $('tooltip');
  const pad = 14;
  let x = e.clientX + pad;
  let y = e.clientY + pad;
  const rect = tt.getBoundingClientRect();
  if (x + rect.width > window.innerWidth - 10) x = e.clientX - rect.width - pad;
  if (y + rect.height > window.innerHeight - 10) y = e.clientY - rect.height - pad;
  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
}
function hideTooltip() {
  $('tooltip').style.display = 'none';
}

load();
</script>
</body>
